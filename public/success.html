<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — adhd-stack.shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header class="site-header">
    <div class="container">
      <h1 class="logo"><a href="/" class="logo-link">adhd-stack<span class="logo-dot">.shop</span></a></h1>
    </div>
  </header>

  <main id="main-content" class="store">
    <div class="container">
      <div class="success-card" role="status">
        <div class="success-icon">
          <svg viewBox="0 0 48 48" fill="none" width="48" height="48" role="img" aria-label="Success checkmark">
            <circle cx="24" cy="24" r="22" stroke="#22c55e" stroke-width="3"/>
            <polyline points="14,25 21,32 34,18" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>
        <h2 class="success-title">Order Confirmed</h2>
        <p class="success-body">
          Your payment was successful. You'll receive a confirmation email shortly
          with tracking details once your kit ships.
        </p>
        <a href="/" class="success-back">Back to store</a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <nav aria-label="Legal">
        <p class="footer-legal">Research compounds only &mdash; not for human consumption. · <a href="/terms.html">Terms &amp; Conditions</a></p>
      </nav>
    </div>
  </footer>

</body>
</html>
