<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>adhd-stack.shop — Cognitive Enhancement Kits</title>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self' 'unsafe-inline';
                 style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
                 font-src 'self' https://fonts.gstatic.com;
                 connect-src 'self' https://adhd-stack-checkout.adhd-stack.workers.dev;
                 img-src 'self' data:;">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="cause-banner">
    <div class="container cause-banner-inner">
      <svg class="cause-emblem" viewBox="0 0 40 48" fill="none" aria-label="Tryzub">
        <path d="M20 2 L20 14 M20 14 C16 14 12 18 12 24 L12 38 C12 38 16 42 20 46 C24 42 28 38 28 38 L28 24 C28 18 24 14 20 14Z
               M20 14 L20 34 M12 24 L16 20 L20 24 L24 20 L28 24 M8 38 L12 38 M28 38 L32 38
               M6 4 C6 4 10 8 14 14 M34 4 C34 4 30 8 26 14"
              stroke="#dab44d" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p class="cause-text">
        <strong>15%</strong> of every kit sold supports ongoing public humanitarian projects in
        <strong>Ukraine</strong>
      </p>
      <span class="cause-counter" id="salesCounter">1,000+ kits sold</span>
    </div>
  </div>

  <header class="site-header">
    <div class="container header-row">
      <div>
        <h1 class="logo">adhd-stack<span class="logo-dot">.shop</span></h1>
        <p class="tagline">Cognitive Enhancement Kits</p>
      </div>
      <button class="btn-theme" id="btnTheme" title="Theme: Auto / Dark / Light">
        <span class="btn-theme-icon" id="themeIcon">◐</span>
        <span id="themeLabel">Auto</span>
      </button>
    </div>
  </header>

  <main class="store">
    <div class="container">
      <div class="kits-grid" id="kits-grid"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="cause-footer">
        <svg class="cause-emblem-sm" viewBox="0 0 40 48" fill="none" aria-label="Tryzub">
          <path d="M20 2 L20 14 M20 14 C16 14 12 18 12 24 L12 38 C12 38 16 42 20 46 C24 42 28 38 28 38 L28 24 C28 18 24 14 20 14Z
                 M20 14 L20 34 M12 24 L16 20 L20 24 L24 20 L28 24 M8 38 L12 38 M28 38 L32 38
                 M6 4 C6 4 10 8 14 14 M34 4 C34 4 30 8 26 14"
                stroke="#dab44d" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <p>
          <strong>15%</strong> of every kit supports humanitarian projects in Ukraine
          &mdash; <strong id="salesCounterFooter">1,000+</strong> kits sold
        </p>
      </div>
      <p class="footer-legal">Research compounds only &mdash; not for human consumption.</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
